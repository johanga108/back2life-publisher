name: Publish Back2Life posts

on:
  schedule:
    # GitHub scheduled runs can be delayed or skipped, so we check all day on
    # off-peak minutes and publish only when a post is due.
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: back2life-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Create .env from GitHub secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CONTENT_SHEET_CSV_URL: ${{ secrets.CONTENT_SHEET_CSV_URL }}
          ENABLED_PLATFORMS: ${{ secrets.ENABLED_PLATFORMS }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          names = [
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
              "IG_ACCESS_TOKEN",
              "IG_USER_ID",
              "CLOUDINARY_CLOUD_NAME",
              "CLOUDINARY_API_KEY",
              "CLOUDINARY_API_SECRET",
              "CONTENT_SHEET_CSV_URL",
              "ENABLED_PLATFORMS",
          ]
          optional_names = [
              "THREADS_ACCESS_TOKEN",
              "THREADS_USER_ID",
              "THREADS_API_VERSION",
          ]
          enabled_platforms = {
              value.strip()
              for value in os.environ.get("ENABLED_PLATFORMS", "").split(",")
          }
          if "threads" in enabled_platforms:
              names.extend(["THREADS_ACCESS_TOKEN", "THREADS_USER_ID"])
          missing = [name for name in names if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing GitHub secrets: {', '.join(missing)}")
          Path(".env").write_text(
              "\n".join(
                  f"{name}={os.environ[name]}"
                  for name in names + optional_names
                  if os.environ.get(name)
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish next due post
        id: publish
        run: |
          set +e
          python3 scripts/publish_next.py > publisher-output.log 2>&1
          code=$?
          cat publisher-output.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save publisher state
        run: |
          git config user.name "back2life-publisher-bot"
          git config user.email "actions@github.com"
          git add state/publisher-state.json
          if git diff --cached --quiet; then
            echo "No publisher state changes to commit."
            exit 0
          fi
          git commit -m "Update publisher state"
          git pull --rebase
          git push

      - name: Fail workflow if publishing failed
        if: steps.publish.outputs.exit_code != '0'
        run: exit "${{ steps.publish.outputs.exit_code }}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          PUBLISH_EXIT_CODE: ${{ steps.publish.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.getenv("TELEGRAM_BOT_TOKEN")
          chat_id = os.getenv("TELEGRAM_ALERT_CHAT_ID")
          if not token or not chat_id:
              print("Telegram alert secret is not configured; skipping alert.")
              raise SystemExit(0)

          exit_code = os.getenv("PUBLISH_EXIT_CODE") or "unknown"
          log_path = "publisher-output.log"
          publisher_output = ""
          if os.path.exists(log_path):
              publisher_output = open(log_path, encoding="utf-8").read().strip()
              if len(publisher_output) > 2500:
                  publisher_output = "... " + publisher_output[-2500:]
          text = "\n".join(
              [
                  "Back2Life publisher: action needed",
                  "",
                  f"Workflow: {os.getenv('WORKFLOW_NAME', 'unknown')}",
                  f"Branch: {os.getenv('BRANCH_NAME', 'unknown')}",
                  f"Publish exit code: {exit_code}",
                  f"Run: {os.getenv('RUN_URL', '')}",
                  "",
                  "Publisher output:",
                  publisher_output or "No output captured.",
              ]
          )
          if len(text) > 3900:
              text = text[:3800] + "\n\n... truncated"
          data = urllib.parse.urlencode(
              {
                  "chat_id": chat_id,
                  "text": text,
                  "disable_web_page_preview": "true",
              }
          ).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          if not payload.get("ok"):
              raise SystemExit(json.dumps(payload, ensure_ascii=False))
          PY
